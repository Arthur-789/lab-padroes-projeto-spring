services:
  padroesdeprojeto:
    build:
      context: .
      dockerfile: Dockerfile
    image: padroesdeprojeto:latest
    container_name: padroesdeprojeto-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped
